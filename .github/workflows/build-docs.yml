name: Build Docs Artifact

# Reusable: called by release-please.yml when a release is created (and available
# via manual dispatch). Builds the Jekyll site and publishes two release assets:
# hyperweaver-docs-{version}.tar.gz (versioned, for provenance) and a version-less
# hyperweaver-docs.tar.gz. The Hyperweaver UI build fetches the version-less asset
# via releases/latest/download into dist/docs — so every backend that embeds the UI
# serves current /docs with no docs pipeline of its own, and nothing to pin.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string
      tag_name:
        description: 'GitHub release tag'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate docs assets (changelogs)
        run: npm run generate-docs

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler: latest
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Package and upload docs artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf "hyperweaver-docs-${{ inputs.version }}.tar.gz" -C _site .
          cp "hyperweaver-docs-${{ inputs.version }}.tar.gz" hyperweaver-docs.tar.gz
          gh release upload "${{ inputs.tag_name }}" \
            "hyperweaver-docs-${{ inputs.version }}.tar.gz" \
            "hyperweaver-docs.tar.gz" --clobber
