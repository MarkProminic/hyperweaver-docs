name: Docs CI

# Build the site and lint the output on every PR + push. Mirrors the quality gate
# the docs had in hyperweaver-server (html-proofer link checking).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-proof:
    name: Build + HTML lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Generate docs assets (Swagger shells + changelogs)
        run: npm run generate-docs

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Lint built HTML (html-proofer)
        # --swap-urls strips the /docs baseurl so links resolve within _site (the app
        # serves _site under /docs at runtime, but html-proofer treats _site as root).
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --no-enforce-https \
            --allow-hash-href \
            --swap-urls "^/docs:" \
            --ignore-urls "/favicon.ico,/images/logo192.png,/images/logo512.png"
