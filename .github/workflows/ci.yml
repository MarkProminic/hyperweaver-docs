name: CI

# Reusable CI. Called by release-please.yml on push to main, and run directly on
# every PR. Lints, builds the Jekyll site, link-checks it (html-proofer), then
# chains CodeQL — same layout as hyperweaver-server / hyperweaver-ui.

on:
  workflow_call:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  build:
    name: Build & Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate docs assets (Swagger shells + changelogs)
        run: npm run generate-docs

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler: latest
          bundler-cache: true

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Lint built HTML (html-proofer)
        # --swap-urls strips the /docs baseurl so links resolve within _site (the app
        # serves _site under /docs at runtime, but html-proofer treats _site as root).
        run: |
          bundle exec htmlproofer _site \
            --disable-external \
            --no-enforce-https \
            --allow-hash-href \
            --swap-urls "^/docs:" \
            --ignore-urls "/favicon.ico,/images/logo192.png,/images/logo512.png"

  codeql-analysis:
    name: CodeQL
    needs: [lint-and-format, build]
    uses: ./.github/workflows/codeql.yml
